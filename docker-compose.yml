version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: royalty-postgres
    environment:
      POSTGRES_DB: royalty_distribution
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
    - 5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
    - royalty-network
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U postgres -d royalty_distribution
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: royalty-redis
    ports:
    - 6379:6379
    volumes:
    - redis_data:/data
    networks:
    - royalty-network
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 5s
      timeout: 3s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: royalty-backend
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/royalty_distribution
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: development
      PORT: 5000
    ports:
    - 5000:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
    - ./backend:/app
    - /app/node_modules
    networks:
    - royalty-network
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: royalty-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
    - 3000:3000
    depends_on:
    - backend
    volumes:
    - ./frontend:/app
    - /app/node_modules
    networks:
    - royalty-network
  nginx:
    image: nginx:alpine
    container_name: royalty-nginx
    ports:
    - 80:80
    - 443:443
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
    - frontend
    - backend
    networks:
    - royalty-network
volumes:
  postgres_data: null
  redis_data: null
networks:
  royalty-network:
    driver: bridge
